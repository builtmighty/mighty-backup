name: Build Release ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build plugin ZIP
        run: |
          PLUGIN_DIR="builtmighty-site-backup"
          mkdir -p "$PLUGIN_DIR"
          rsync -a --exclude="$PLUGIN_DIR" --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.gitignore' . "$PLUGIN_DIR/"
          zip -r builtmighty-site-backup.zip "$PLUGIN_DIR"

      - name: Upload ZIP to release
        run: gh release upload "${{ github.event.release.tag_name }}" builtmighty-site-backup.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
