name: Build Release ZIP

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build plugin ZIP
        run: |
          PLUGIN_DIR="builtmighty-site-backup"
          mkdir -p "$PLUGIN_DIR"
          rsync -a --exclude="$PLUGIN_DIR" --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='.gitignore' . "$PLUGIN_DIR/"
          zip -r builtmighty-site-backup.zip "$PLUGIN_DIR"

      - name: Get latest release tag
        id: tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(gh release list --limit 1 --json tagName -q '.[0].tagName')" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP to release
        run: gh release upload "${{ steps.tag.outputs.tag }}" builtmighty-site-backup.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
